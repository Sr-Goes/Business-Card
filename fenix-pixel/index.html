<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Fênix pixel — outono ao pôr do sol. Cena interativa.">
  <title>Fênix pixel — outono</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="back" href="../index.html">← Portfólio</a>

  <div
    id="scene"
    class="scene"
    role="application"
    aria-label="Cena interativa com fênix."
  >
    <div class="bg-autumn" aria-hidden="true"></div>
    <div class="sky-depth" aria-hidden="true"></div>

    <div class="sun-assembly" aria-hidden="true">
      <div class="sun-glow"></div>
      <div class="sun-disc"></div>
    </div>

    <div class="parallax parallax--far" aria-hidden="true">
      <div class="parallax__track parallax__track--far"></div>
    </div>

    <div class="parallax parallax--ridge" aria-hidden="true">
      <div class="parallax__track parallax__track--ridge"></div>
    </div>

    <div class="parallax parallax--forest" aria-hidden="true">
      <div class="parallax__track parallax__track--forest"></div>
    </div>

    <div class="parallax parallax--bushes" aria-hidden="true">
      <div class="parallax__track parallax__track--bushes"></div>
    </div>

    <div class="parallax parallax--ground" aria-hidden="true">
      <div class="parallax__track parallax__track--ground"></div>
    </div>

    <div class="mist-near" aria-hidden="true"></div>

    <div id="embers-root" class="embers-root" aria-hidden="true"></div>

    <div id="phoenix" class="phoenix" aria-hidden="true">
      <svg
        class="phoenix__svg"
        viewBox="0 0 32 22"
        width="160"
        height="110"
        xmlns="http://www.w3.org/2000/svg"
        shape-rendering="crispEdges"
        focusable="false"
      >
        <g class="fenix-tail-body">
          <rect x="0" y="8" width="2" height="2" fill="#b91c1c"/>
          <rect x="0" y="10" width="3" height="3" fill="#dc2626"/>
          <rect x="2" y="7" width="2" height="4" fill="#ea580c"/>
          <rect x="3" y="11" width="4" height="2" fill="#f97316"/>
          <rect x="4" y="6" width="3" height="3" fill="#fb923c"/>
          <rect x="6" y="9" width="3" height="4" fill="#fdba74"/>
          <rect x="8" y="8" width="5" height="5" fill="#7c2d12"/>
          <rect x="9" y="7" width="4" height="6" fill="#9a3412"/>
          <rect x="10" y="8" width="4" height="4" fill="#c2410c"/>
          <rect x="11" y="9" width="3" height="3" fill="#ea580c"/>
          <rect x="14" y="9" width="3" height="3" fill="#fff7ed"/>
          <rect x="15" y="10" width="2" height="2" fill="#ffedd5"/>
          <rect x="20" y="8" width="3" height="3" fill="#f97316"/>
          <rect x="23" y="9" width="2" height="2" fill="#fdba74"/>
          <rect x="25" y="9" width="3" height="2" fill="#fef3c7"/>
          <rect x="28" y="10" width="2" height="1" fill="#fffbeb"/>
          <rect x="21" y="7" width="2" height="2" fill="#fcd34d"/>
        </g>

        <g transform="translate(14, 10)">
          <g class="wing-flap wing-flap--upper">
            <g transform="translate(-14, -10)">
              <rect x="12" y="4" width="2" height="2" fill="#fcd34d"/>
              <rect x="13" y="3" width="4" height="3" fill="#fbbf24"/>
              <rect x="14" y="2" width="6" height="4" fill="#f59e0b"/>
              <rect x="16" y="1" width="5" height="3" fill="#fb923c"/>
              <rect x="18" y="0" width="4" height="2" fill="#fed7aa"/>
            </g>
          </g>
        </g>

        <g transform="translate(16, 13)">
          <g class="wing-flap wing-flap--lower">
            <g transform="translate(-16, -13)">
              <rect x="13" y="12" width="3" height="2" fill="#f97316"/>
              <rect x="14" y="13" width="5" height="3" fill="#ea580c"/>
              <rect x="16" y="14" width="6" height="3" fill="#c2410c"/>
              <rect x="19" y="15" width="4" height="2" fill="#9a3412"/>
            </g>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
