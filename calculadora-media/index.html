<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Calculadora de média escolar — quatro notas, média 6 para aprovação.">
  <title>Calculadora de média</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="back" href="../index.html">← Voltar ao portfólio</a>

  <main class="panel">
    <p class="eyebrow">Imersão Dev · exercício</p>
    <h1>Calculadora de média</h1>
    <p class="lead">Digite as quatro notas (0 a 10). A média mínima para aprovação é <strong>6</strong>.</p>

    <div class="grid">
      <label class="field">
        <span>1.º bimestre</span>
        <input id="n1" type="number" inputmode="decimal" min="0" max="10" step="0.1" placeholder="0">
      </label>
      <label class="field">
        <span>2.º bimestre</span>
        <input id="n2" type="number" inputmode="decimal" min="0" max="10" step="0.1" placeholder="0">
      </label>
      <label class="field">
        <span>3.º bimestre</span>
        <input id="n3" type="number" inputmode="decimal" min="0" max="10" step="0.1" placeholder="0">
      </label>
      <label class="field">
        <span>4.º bimestre</span>
        <input id="n4" type="number" inputmode="decimal" min="0" max="10" step="0.1" placeholder="0">
      </label>
    </div>

    <button type="button" class="btn" id="btnCalc">Calcular média</button>
    <p class="result" id="result" role="status" aria-live="polite"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
