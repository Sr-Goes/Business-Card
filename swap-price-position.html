<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troca de Posição - Preço à Vista e Parcelado</title>
    <style>
        /* CSS para reorganizar a posição dos preços */
        .item-price-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* Reordenar elementos usando CSS Order */
        .item-price-container .js-price-display {
            order: 2; /* Preço à vista vai para baixo */
        }

        .item-price-container .js-compare-price-display {
            order: 3; /* Preço comparativo vai para o final */
        }

        .js-max-installments-container {
            order: 1; /* Preço parcelado vai para cima */
            margin-bottom: 8px;
        }

        /* Estilização adicional para melhor visualização */
        .js-max-installments {
            font-weight: bold;
            color: #2d5aa0;
            font-size: 1.1em;
        }

        .js-price-display {
            font-size: 0.9em;
            color: #666;
        }

        .price-compare {
            text-decoration: line-through;
            color: #999;
            font-size: 0.85em;
        }

        /* Container do produto para demonstração */
        .item-description {
            max-width: 300px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 20px;
            font-family: Arial, sans-serif;
        }

        .item-name {
            font-weight: bold;
            color: #333;
        }

        .item-link {
            text-decoration: none;
            color: inherit;
        }

        .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
        .mb-1 { margin-bottom: 0.25rem; }
        .mb-3 { margin-bottom: 0.75rem; }
    </style>
</head>
<body>
    <h1>Demonstração: Troca de Posição dos Preços</h1>
    
    <h2>Antes (Original):</h2>
    <div class="item-description py-4 px-3 original" data-store="product-item-info-264505755">
        <a href="#" title="Camiseta Lacoste manga longa" aria-label="Camiseta Lacoste manga longa" class="item-link">
            <div class="js-item-name item-name mb-3" data-store="product-item-name-264505755">Camiseta Lacoste manga longa</div>
            <div class="item-price-container mb-1" data-store="product-item-price-264505755" style="display: block;">
                <span class="js-compare-price-display price-compare" style="display:inline-block;">
                    R$599,99
                </span>
                <span class="js-price-display item-price" data-product-price="47999">
                    R$479,99
                </span>
            </div>
        </a>
        <div class="js-max-installments-container js-max-installments item-installments">
            <div class="js-max-installments product-installments installment-no-interest">
                <span class="js-installment-amount product-installment-amount">6</span>
                <span>x de</span>
                <span class="js-installment-price product-installment-value">R$80,00</span>
                <span>sem juros</span>
            </div>
        </div>
    </div>

    <h2>Depois (Com CSS aplicado):</h2>
    <div class="item-description py-4 px-3" data-store="product-item-info-264505755">
        <a href="#" title="Camiseta Lacoste manga longa" aria-label="Camiseta Lacoste manga longa" class="item-link">
            <div class="js-item-name item-name mb-3" data-store="product-item-name-264505755">Camiseta Lacoste manga longa</div>
            <div class="item-price-container mb-1" data-store="product-item-price-264505755">
                <span class="js-compare-price-display price-compare" style="display:inline-block;">
                    R$599,99
                </span>
                <span class="js-price-display item-price" data-product-price="47999">
                    R$479,99
                </span>
            </div>
        </a>
        <div class="js-max-installments-container js-max-installments item-installments">
            <div class="js-max-installments product-installments installment-no-interest">
                <span class="js-installment-amount product-installment-amount">6</span>
                <span>x de</span>
                <span class="js-installment-price product-installment-value">R$80,00</span>
                <span>sem juros</span>
            </div>
        </div>
    </div>

    <script>
        // Alternativa usando JavaScript para reorganizar os elementos
        function swapPricePositions() {
            // Seleciona todos os containers de produto
            const productContainers = document.querySelectorAll('[data-store*="product-item-info"]');
            
            productContainers.forEach(container => {
                const priceContainer = container.querySelector('.item-price-container');
                const installmentsContainer = container.querySelector('.js-max-installments-container');
                
                if (priceContainer && installmentsContainer) {
                    // Move o container de parcelas para antes do container de preços
                    priceContainer.parentNode.insertBefore(installmentsContainer, priceContainer);
                }
            });
        }

        // Função para aplicar estilos via JavaScript (alternativa ao CSS)
        function applySwapStyles() {
            const style = document.createElement('style');
            style.textContent = `
                .item-price-container {
                    display: flex;
                    flex-direction: column;
                    gap: 5px;
                }
                
                .item-price-container .js-price-display {
                    order: 2;
                }
                
                .item-price-container .js-compare-price-display {
                    order: 3;
                }
                
                .js-max-installments-container {
                    order: 1;
                    margin-bottom: 8px;
                }
                
                .js-max-installments {
                    font-weight: bold;
                    color: #2d5aa0;
                    font-size: 1.1em;
                }
                
                .js-price-display {
                    font-size: 0.9em;
                    color: #666;
                }
            `;
            document.head.appendChild(style);
        }

        // Executar quando a página carregar
        document.addEventListener('DOMContentLoaded', function() {
            // Uncomment a linha abaixo se quiser usar JavaScript ao invés de CSS
            // swapPricePositions();
            
            console.log('Troca de posição dos preços aplicada via CSS');
        });
    </script>
</body>
</html>
